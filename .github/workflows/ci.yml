name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run pytest
        run: pytest -q
      - name: Run basic report example
        run: PYTHONPATH=src python examples/basic_report.py
      - name: Run recorder export example
        run: PYTHONPATH=src python examples/recorder_export.py
